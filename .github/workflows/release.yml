name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: pwsh
        run: |
          $tag = "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Stable release tag must be vMAJOR.MINOR.PATCH without prerelease suffix. Got: $tag"
          }
          $version = $tag.Substring(1)
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $version) {
            throw "Release tag $tag does not match package.json version $packageVersion"
          }

      - run: pnpm build

      - run: pnpm vitest run --testTimeout 15000

      - name: Run Electron UI smoke
        if: matrix.platform != 'linux'
        run: pnpm test:electron-ui-smoke

      - name: Run Electron UI smoke on Linux
        if: matrix.platform == 'linux'
        run: xvfb-run --auto-servernum pnpm test:electron-ui-smoke

      - name: Verify Windows signing credentials
        if: matrix.platform == 'win'
        shell: pwsh
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_LINK)) { $missing += "WINDOWS_CSC_LINK" }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_KEY_PASSWORD)) { $missing += "WINDOWS_CSC_KEY_PASSWORD" }
          if ($missing.Count -gt 0) {
            throw "Missing required stable-release secrets: $($missing -join ', ')"
          }

      - name: Verify macOS signing and notarization credentials
        if: matrix.platform == 'mac'
        shell: pwsh
        env:
          MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:MACOS_CSC_LINK)) { $missing += "MACOS_CSC_LINK" }
          if ([string]::IsNullOrWhiteSpace($env:MACOS_CSC_KEY_PASSWORD)) { $missing += "MACOS_CSC_KEY_PASSWORD" }
          if ([string]::IsNullOrWhiteSpace($env:APPLE_ID)) { $missing += "APPLE_ID" }
          if ([string]::IsNullOrWhiteSpace($env:APPLE_APP_SPECIFIC_PASSWORD)) { $missing += "APPLE_APP_SPECIFIC_PASSWORD" }
          if ([string]::IsNullOrWhiteSpace($env:APPLE_TEAM_ID)) { $missing += "APPLE_TEAM_ID" }
          if ($missing.Count -gt 0) {
            throw "Missing required stable-release secrets: $($missing -join ', ')"
          }

      - name: Publish Windows Electron release
        if: matrix.platform == 'win'
        run: pnpm exec electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Publish Linux Electron release
        if: matrix.platform == 'linux'
        run: pnpm exec electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish macOS Electron release
        if: matrix.platform == 'mac'
        run: pnpm exec electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
