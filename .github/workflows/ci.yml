name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Electron UI smoke on Windows
        if: runner.os == 'Windows'
        run: pnpm test:electron-ui-smoke
      - name: Run Electron UI smoke on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm test:electron-ui-smoke
      - run: pnpm vitest run --testTimeout 15000
